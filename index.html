<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 - 真实版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#1677ff' } } }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .chat-user { @apply bg-primary text-white rounded-2xl rounded-tr-none px-4 py-3 max-w-[85%] my-2; }
            .chat-ai { @apply bg-white border rounded-2xl rounded-tl-none px-4 py-3 max-w-[85%] my-2; }
            .typing::after { content: "|"; animation: blink 1s infinite; }
            @keyframes blink { 50% { opacity: 0; } }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<!-- 顶部栏 -->
<header class="bg-white shadow px-4 py-3 flex justify-between items-center sticky top-0">
    <div class="flex items-center gap-2">
        <i class="fa fa-robot text-primary text-xl"></i>
        <h1 class="font-bold">智能AI助手</h1>
    </div>
    <button id="clear" class="text-gray-500 hover:text-red-500"><i class="fa fa-trash mr-1"></i>清空</button>
</header>

<!-- 聊天区域 -->
<main id="container" class="flex-1 p-4 overflow-y-auto pb-24"></main>

<!-- 输入框 -->
<footer class="fixed bottom-0 w-full bg-white p-3 shadow-lg border-t">
    <div class="max-w-3xl mx-auto flex gap-2">
        <input id="input" placeholder="输入问题..." class="flex-1 border rounded-full px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary">
        <button id="send" class="bg-primary text-white rounded-full w-12 h-12 flex items-center justify-center hover:opacity-90">
            <i class="fa fa-paper-plane"></i>
        </button>
    </div>
</footer>

<script>
// 👇 替换成你的 Gemini API Key
const API_KEY = "bce-v3/ALTAK-UgVQ3pkFJlseyA8PFcxwK/4bfcff89ab519a9f0d39c96eba4033e13cbd78ea";
const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;

const container = document.getElementById("container");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const clearBtn = document.getElementById("clear");

// 初始化欢迎语
addMessage("ai", "你好！我是接入真实AI的助手，有什么可以帮你？");

// 发送消息
async function send() {
    const text = input.value.trim();
    if (!text) return;
    
    addMessage("user", text);
    input.value = "";
    
    // AI加载中
    const aiMsg = addMessage("ai", "");
    aiMsg.classList.add("typing");
    
    try {
        // 调用真实AI API
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text }] }]
            })
        });
        
        const data = await res.json();
        const reply = data.candidates[0].content.parts[0].text;
        aiMsg.classList.remove("typing");
        typeWriter(aiMsg, reply);
    } catch (err) {
        aiMsg.classList.remove("typing");
        aiMsg.textContent = "出错啦！检查API Key或网络~";
    }
}

// 打字机效果（仿豆包）
function typeWriter(el, text) {
    let i = 0;
    el.textContent = "";
    (function typing() {
        if (i < text.length) {
            el.textContent += text.charAt(i++);
            setTimeout(typing, 10);
        }
    })();
}

// 添加消息到页面
function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = role === "user" ? "flex justify-end" : "flex justify-start";
    const bubble = document.createElement("div");
    bubble.className = role === "user" ? "chat-user" : "chat-ai";
    bubble.textContent = text;
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return bubble;
}

// 事件绑定
sendBtn.addEventListener("click", send);
input.addEventListener("keypress", e => e.key === "Enter" && send());
clearBtn.addEventListener("click", () => {
    container.innerHTML = "";
    addMessage("ai", "你好！我是接入真实AI的助手，有什么可以帮你？");
});
</script>
</body>
</html>
